// ── Chip selector logic ───────────────────────────────────────────────────────
document.querySelectorAll('.chip-group').forEach(group => {
  group.addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
  });
});

function getChip(groupId) {
  return document.querySelector(`#${groupId} .chip.active`)?.dataset.val || '';
}

// ── Scoring & filter logic ────────────────────────────────────────────────────
let lastMealIndex = -1;

function pickMeal() {
  const mood   = getChip('mood-chips');
  const diet   = getChip('diet-chips');
  const budget = getChip('budget-chips');
  const time   = +getChip('time-chips');

  // Score each meal
  let candidates = MEALS.map((meal, i) => {
    let score = 0;
    if (meal.mood.includes(mood))       score += 30;
    if (meal.diet.includes(diet) || diet === 'any') score += 25;
    if (meal.budget.includes(budget))   score += 25;
    if (meal.time.includes(time))       score += 20;
    return { meal, score, i };
  });

  // Filter to at least some score, avoid repeating last
  candidates.sort((a, b) => b.score - a.score);
  const topScore = candidates[0].score;
  const pool = candidates.filter(c => c.score >= topScore - 20 && c.i !== lastMealIndex);
  const pick = pool[Math.floor(Math.random() * pool.length)];
  lastMealIndex = pick.i;
  renderMeal(pick.meal);
}

function renderMeal(meal) {
  const budgetMap   = {'$':'Budget-friendly','$$':'Mid-range','$$$':'Splurge'};
  const budgetLabel = meal.budget.map(b => budgetMap[b] || b).join(' / ');

  document.getElementById('meal-result').innerHTML = `
    <div class="meal-card">
      <div class="meal-hero">
        <div class="meal-emoji-big">${meal.emoji}</div>
        <div class="meal-name">${meal.name}</div>
        <div class="meal-description">${meal.desc}</div>
        <div class="meal-badges">
          <span class="badge badge-purple">⏱ ${meal.cookTime}</span>
          <span class="badge" style="background:rgba(0,212,170,0.15);color:var(--accent2)">🎯 ${meal.difficulty}</span>
          <span class="badge" style="background:rgba(255,170,0,0.15);color:#ffaa00">💰 ${budgetLabel}</span>
        </div>
      </div>
      <div class="meal-body">
        <div class="meal-section-title">Ingredients</div>
        <div class="ingredients-list">
          ${meal.ingredients.map(ing => `<span class="ingredient-tag">${ing}</span>`).join('')}
        </div>

        <div class="meal-section-title">Recipe</div>
        <ol class="recipe-steps">
          ${meal.recipe.map((step, i) => `
            <li class="recipe-step">
              <span class="step-num">${i+1}</span>
              <span class="step-text">${step}</span>
            </li>
          `).join('')}
        </ol>

        <div class="meal-actions">
          <button class="btn btn-teal" onclick="pickMeal()">Not feeling it? Try another 🎲</button>
          <button class="btn btn-secondary" onclick="shareMeal('${meal.name}')">Share this meal</button>
        </div>

        <div class="affiliate-box">
          <strong>🛒 Get the ingredients delivered</strong>
          Sponsored · Affiliate links go here
          <div>
            <a href="#" class="affiliate-btn">🛍️ Order on Instacart · affiliate link</a>
            <a href="#" class="affiliate-btn" style="margin-left:8px">📦 Amazon Fresh · affiliate link</a>
          </div>
        </div>
      </div>
    </div>
  `;
}

function shareMeal(name) {
  const text = `I just used VibeCheck to find my next meal: ${name} 🍽️\n\nFind yours →`;
  if (navigator.share) {
    navigator.share({ title: 'What Should I Eat?', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href)
      .then(() => showToast('Copied to clipboard! 📋'));
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Auto-pick on load
pickMeal();
